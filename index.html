<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NexusFlow - An industry-level project management platform featuring Kanban boards, sprints, real-time collaboration, AI assistant, wiki, video meetings, and more.">
  <meta name="keywords" content="project management, kanban board, agile, sprint, collaboration, NexusFlow">
  <title>NexusFlow | Next-Gen Project Management Platform</title>

  <!-- Bootstrap 5 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- NexusFlow Custom Stylesheet -->
  <link rel="stylesheet" href="/css/styles.css">

  <style>
    /* Additional inline critical styles for a premium first load */
    html, body {
      background: radial-gradient(circle at 10% 20%, rgb(18, 16, 43) 0%, rgb(0, 0, 0) 99%);
      min-height: 100vh;
    }

    /* Toast Banner Animations */
    .toast-banner {
      padding: 0;
      animation: slide-in-right 0.3s ease;
      min-width: 280px;
    }

    @keyframes slide-in-right {
      from { transform: translateX(100px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .toast-banner.success { border-left: 4px solid var(--success-color); }
    .toast-banner.error { border-left: 4px solid var(--danger-color); }

    /* Polished Dropdown Menu */
    .dropdown-menu.dropdown-menu-dark {
      background: rgba(15, 12, 30, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
    }

    /* Custom Button Utility Classes */
    .btn-indigo {
      background: var(--accent-gradient);
      border: none;
      color: white;
      font-weight: 600;
    }

    .btn-indigo:hover {
      opacity: 0.9;
      color: white;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(99,102,241,0.3);
    }

    /* Override Bootstrap table for glass themed dark */
    .table-dark { background: transparent; }
    .table-dark thead tr th { background: rgba(0,0,0,0.4); }
    .table-dark tbody tr:hover td { background: rgba(255,255,255,0.03); }
    .table-dark td, .table-dark th { border-color: rgba(255,255,255,0.06); }

    /* Kanban column drop zone highlight */
    .task-list-cards.drag-over {
      background: rgba(99,102,241,0.08) !important;
      border: 2px dashed rgba(99,102,241,0.4);
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <!-- App Root – JS mounts here -->
  <div id="app-root"></div>

  <!-- Socket.io client (auto served by socket.io server) -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

  <!-- NexusFlow App Entry Point (ES Module) -->
  <script type="module" src="/js/app.js"></script>

  <!-- Task Detail View – Global listener initializer -->
  <script type="module">
    import { taskDetailView } from '/js/views/taskDetailView.js';
    taskDetailView.init();
  </script>

</body>
</html>
