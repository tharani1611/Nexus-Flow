version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/nexusflow
      - JWT_SECRET=nexusflow_access_secret_key_change_me_in_production_12345
      - JWT_REFRESH_SECRET=nexusflow_refresh_secret_key_change_me_in_production_12345
      - PORT=5000
    depends_on:
      - mongo

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
